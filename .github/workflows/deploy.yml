name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # EmailJS — repo secrets (Settings → Secrets and variables → Actions)
      VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
      VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
      VITE_EMAILJS_WAITLIST_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_WAITLIST_TEMPLATE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Android URL is NOT passed to Vite — written to public/android-beta.json only (no old URL stuck in JS bundle).
      # Set repository Secret OR Variable named VITE_ANDROID_BETA_URL, then redeploy.
      - name: Write Android beta URL for site
        env:
          ANDROID_BETA_URL: ${{ secrets.VITE_ANDROID_BETA_URL || vars.VITE_ANDROID_BETA_URL }}
        run: node scripts/write-android-beta-json.mjs

      - name: Build
        run: npm run build

      - name: Copy 404
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
